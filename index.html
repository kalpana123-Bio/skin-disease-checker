<!DOCTYPE html>
<html>
<head>
  <title>Kalpana Skin Clinic - Advanced Checker</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
      text-align: center;
    }

    input, select, button {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: none;
    }

    .section {
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
      margin: 10px;
      text-align: left;
    }

    button {
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:white;
      color:black;
      padding:20px;
      border-radius:10px;
      width:90%;
      max-width:400px;
    }
  </style>
</head>

<body>

<h2>🧠 Kalpana Skin Clinic - Smart Diagnosis</h2>

<input type="text" id="name" placeholder="Name">
<input type="number" id="age" placeholder="Age">

<select id="gender">
  <option value="">Gender</option>
  <option>Male</option>
  <option>Female</option>
</select>

<!-- EXTRA QUESTIONS -->
<select id="duration">
  <option value="">Duration</option>
  <option value="short">1-3 days</option>
  <option value="medium">1-2 weeks</option>
  <option value="long">More than 2 weeks</option>
</select>

<select id="spread">
  <option value="">Area Spread</option>
  <option value="small">Small area</option>
  <option value="medium">Moderate</option>
  <option value="large">Large area</option>
</select>

<select id="severityLevel">
  <option value="">Severity Level</option>
  <option value="low">Mild</option>
  <option value="medium">Moderate</option>
  <option value="high">Severe</option>
</select>

<!-- SYMPTOMS -->
<div class="section">
  <h3>Symptoms</h3>
  <label><input type="checkbox" value="itch"> Itching</label>
  <label><input type="checkbox" value="dry"> Dry skin</label>
  <label><input type="checkbox" value="redness"> Redness</label>
  <label><input type="checkbox" value="pimple"> Pimples</label>
  <label><input type="checkbox" value="blackhead"> Blackheads</label>
  <label><input type="checkbox" value="pus"> Pus</label>
  <label><input type="checkbox" value="ring"> Ring patch</label>
  <label><input type="checkbox" value="scaling"> Scaling</label>
  <label><input type="checkbox" value="dark"> Dark spots</label>
</div>

<input type="file" id="image" accept="image/*">

<button onclick="analyze()">Analyze</button>

<div id="popup" class="modal">
  <div class="modal-content">
    <div id="result"></div>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>

function getSymptoms(){
  return Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
              .map(cb => cb.value);
}

function analyze(){

  const symptoms = getSymptoms();
  const duration = document.getElementById("duration").value;
  const spread = document.getElementById("spread").value;
  const severityInput = document.getElementById("severityLevel").value;

  // SCORE SYSTEM
  let scores = {
    eczema: 0,
    acne: 0,
    fungal: 0,
    bacterial: 0,
    pigmentation: 0
  };

  // SYMPTOM SCORING

  symptoms.forEach(s => {
    if(["itch","dry","redness"].includes(s)) scores.eczema += 2;
    if(["pimple","blackhead"].includes(s)) scores.acne += 2;
    if(["ring","scaling"].includes(s)) scores.fungal += 3;
    if(["pus"].includes(s)) scores.bacterial += 3;
    if(["dark"].includes(s)) scores.pigmentation += 2;
  });

  // EXTRA FACTORS

  if(duration === "long") {
    scores.fungal += 1;
    scores.pigmentation += 1;
  }

  if(spread === "large") {
    scores.eczema += 1;
    scores.fungal += 1;
  }

  if(severityInput === "high") {
    scores.bacterial += 2;
  }

  // FIND MAX
  let disease = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);

  let resultText = "";

  switch(disease){
    case "eczema":
      resultText = "Eczema / Allergy";
      break;
    case "acne":
      resultText = "Acne";
      break;
    case "fungal":
      resultText = "Fungal Infection";
      break;
    case "bacterial":
      resultText = "Bacterial Infection";
      break;
    case "pigmentation":
      resultText = "Pigmentation";
      break;
  }

  document.getElementById("result").innerHTML = `
  <h3>Result</h3>
  <p><b>Condition:</b> ${resultText}</p>
  <p><b>Confidence Score:</b> ${scores[disease]}</p>
  <p>⚠️ This is not a medical diagnosis.</p>
  `;

  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
