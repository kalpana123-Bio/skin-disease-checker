<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic - Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
  padding:20px;
}

.container {
  max-width:900px;
  margin:auto;
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button {
  background:#38bdf8;
  cursor:pointer;
}

.symptom-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.symptom-item {
  display:flex;
  gap:10px;
  padding:10px;
  background:rgba(255,255,255,0.08);
  border-radius:8px;
}

.bar {
  height:10px;
  background:#38bdf8;
  margin:5px 0;
}

.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
  max-height:80vh;
  overflow:auto;
}
</style>
</head>

<body>

<div class="container">

<h2>🧠 Kalpana Skin Clinic</h2>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">

<div class="symptom-grid">
<label class="symptom-item"><input type="checkbox" value="itch"> Itching</label>
<label class="symptom-item"><input type="checkbox" value="dry"> Dry Skin</label>
<label class="symptom-item"><input type="checkbox" value="redness"> Redness</label>
<label class="symptom-item"><input type="checkbox" value="pimple"> Pimples</label>
<label class="symptom-item"><input type="checkbox" value="blackhead"> Blackheads</label>
<label class="symptom-item"><input type="checkbox" value="pus"> Pus</label>
<label class="symptom-item"><input type="checkbox" value="ring"> Ring Patch</label>
<label class="symptom-item"><input type="checkbox" value="scaling"> Scaling</label>
<label class="symptom-item"><input type="checkbox" value="dark"> Dark Spots</label>
</div>

<button onclick="analyze()">Analyze</button>
<button onclick="loadPatients()">👨‍⚕️ Doctor Dashboard</button>

</div>

<div id="popup" class="modal">
<div class="modal-content" id="result"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>

// 🔥 PASTE YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// GET SYMPTOMS
function getSymptoms(){
 return Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
 .map(cb=>cb.value);
}

// ANALYZE + SAVE
function analyze(){

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;
let symptoms=getSymptoms();

let disease="General Skin Issue";

if(symptoms.includes("pimple")) disease="Acne";
if(symptoms.includes("ring")) disease="Fungal Infection";
if(symptoms.includes("itch")) disease="Eczema";

// SAVE
db.collection("patients").add({
 name, age, disease,
 date:new Date().toLocaleString()
});

document.getElementById("result").innerHTML=`
<h3>Diagnosis</h3>
<p>${disease}</p>
<button onclick="closePopup()">Close</button>
`;

document.getElementById("popup").style.display="flex";
}

// DASHBOARD
function loadPatients(){

let html="<h2>👨‍⚕️ Dashboard</h2>";

db.collection("patients").get().then(snapshot=>{

let counts={};

snapshot.forEach(doc=>{

let p=doc.data();
counts[p.disease]=(counts[p.disease]||0)+1;

html+=`
<div style="background:#fff;color:#000;padding:10px;margin:10px;border-radius:8px;">
<p><b>${p.name}</b></p>
<p>${p.disease}</p>

<button onclick="deletePatient('${doc.id}')">❌ Delete</button>
<button onclick="editPatient('${doc.id}','${p.name}','${p.age}')">✏ Edit</button>
</div>
`;

});

// ANALYTICS
html+="<h3>📊 Analytics</h3>";

for(let d in counts){
html+=`<p>${d} (${counts[d]})</p>
<div class="bar" style="width:${counts[d]*30}px"></div>`;
}

document.getElementById("result").innerHTML=html;
document.getElementById("popup").style.display="flex";

});

}

// DELETE
function deletePatient(id){
db.collection("patients").doc(id).delete().then(()=>{
alert("Deleted");
loadPatients();
});
}

// EDIT
function editPatient(id,name,age){

let newName=prompt("Edit Name",name);
let newAge=prompt("Edit Age",age);

db.collection("patients").doc(id).update({
 name:newName,
 age:newAge
}).then(()=>{
alert("Updated");
loadPatients();
});

}

// CLOSE
function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
