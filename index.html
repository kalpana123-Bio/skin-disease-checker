<!DOCTYPE html>
<html>
<head>
  <title>Kalpana Skin Clinic - Skin Disease Checker</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    input, textarea, select, button {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }

    img {
      max-width: 200px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      text-align: left;
    }

    .header {
      text-align: center;
      border-bottom: 2px solid #000;
      margin-bottom: 10px;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .doctor {
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h2>🧠 Kalpana Skin Clinic</h2>

<input type="file" id="image" accept="image/*">
<img id="preview">

<input type="text" id="name" placeholder="Name">
<input type="number" id="age" placeholder="Age">

<select id="gender">
  <option value="">Select Gender</option>
  <option>Male</option>
  <option>Female</option>
</select>

<textarea id="symptoms" placeholder="Enter symptoms (itching, redness, acne, pus, dry skin, swelling, dark spots, burning...)"></textarea>

<button onclick="analyze()">Generate Prescription</button>

<!-- Modal -->
<div id="popup" class="modal">
  <div class="modal-content" id="prescriptionBox">

    <div class="header">
      <div class="logo">🏥 Kalpana Skin Clinic</div>
      <div class="doctor">Dr. Kalpana P</div>
    </div>

    <div id="prescriptionText"></div>

    <button onclick="downloadPDF()">🖨️ Download PDF</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

// Preview image
image.addEventListener("change", function() {
  const file = this.files[0];
  const reader = new FileReader();
  reader.onload = e => preview.src = e.target.result;
  if(file) reader.readAsDataURL(file);
});

function analyze() {

  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const gender = document.getElementById("gender").value;
  const symptoms = document.getElementById("symptoms").value.toLowerCase();

  let disease = "Unknown";
  let severity = "Low";
  let cureTime = "Consult doctor";
  let advice = "Consult a dermatologist";

  const s = symptoms;

  // ECZEMA / ALLERGY
  if (
    s.includes("itch") || s.includes("itching") ||
    s.includes("rash") || s.includes("redness") ||
    s.includes("swelling") || s.includes("dry") ||
    s.includes("flaky") || s.includes("irritation") ||
    s.includes("burning")
  ){
    disease = "Eczema / Allergy";
    severity = "Medium";
    cureTime = "1-2 weeks";
    advice = "Use moisturizer, avoid allergens, use mild soap";
  }

  // ACNE
  else if (
    s.includes("acne") || s.includes("pimple") ||
    s.includes("blackhead") || s.includes("whitehead") ||
    s.includes("oil") || s.includes("oily skin") ||
    s.includes("pus") || s.includes("zits")
  ){
    disease = "Acne";
    severity = "Low";
    cureTime = "1-2 weeks";
    advice = "Keep skin clean, avoid oily products, drink water";
  }

  // FUNGAL
  else if (
    s.includes("patch") || s.includes("white") ||
    s.includes("ring") || s.includes("circle") ||
    s.includes("fungal") || s.includes("scaling") ||
    s.includes("peeling") || s.includes("crack")
  ){
    disease = "Fungal Infection";
    severity = "Medium";
    cureTime = "2-3 weeks";
    advice = "Keep area dry, use antifungal cream";
  }

  // BACTERIAL
  else if (
    s.includes("pain") || s.includes("pus") ||
    s.includes("yellow") || s.includes("discharge") ||
    s.includes("boil") || s.includes("abscess")
  ){
    disease = "Bacterial Infection";
    severity = "High";
    cureTime = "1-2 weeks";
    advice = "Do not squeeze, keep clean, consult doctor immediately";
  }

  // PIGMENTATION
  else if (
    s.includes("dark") || s.includes("pigment") ||
    s.includes("spots") || s.includes("tan") ||
    s.includes("uneven")
  ){
    disease = "Pigmentation";
    severity = "Low";
    cureTime = "3-4 weeks";
    advice = "Use sunscreen, avoid sun exposure";
  }

  const text = `
Patient: ${name}
Age: ${age} | Gender: ${gender}

Condition: ${disease}
Severity: ${severity}
Estimated Recovery: ${cureTime}

Advice:
${advice}

⚠️ This is not a medical diagnosis.
Consult a certified doctor.
`;

  document.getElementById("prescriptionText").innerText = text;
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

function downloadPDF(){
  const element = document.getElementById("prescriptionBox");
  html2pdf().from(element).save("Prescription.pdf");
}

</script>

</body>
</html>
