<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
margin:0;
padding:20px;
}

/* CENTER CARD */
.card{
max-width:850px;
margin:auto;
background:#2b3f73;
padding:25px;
border-radius:15px;
animation:fadeIn 0.5s ease;
}

/* INPUT FIX */
input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
box-sizing:border-box; /* 🔥 IMPORTANT FIX */
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:linear-gradient(90deg,#38bdf8,#06b6d4);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

/* GRID PERFECT */
.symptoms{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.symptom{
display:flex;
justify-content:space-between;
align-items:center;
background:#3d568a;
padding:12px;
border-radius:10px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
color:black;
padding:20px;
border-radius:12px;
width:90%;
max-width:600px;
max-height:80vh;
overflow-y:auto; /* 🔥 SCROLL FIX */
animation:scaleUp 0.4s;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@keyframes scaleUp{
from{transform:scale(0.8);}
to{transform:scale(1);}
}

.hidden{display:none;}

.bar{
height:10px;
background:#38bdf8;
margin:5px 0;
border-radius:5px;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="card">
<h2>🏥 Kalpana Skin Clinic</h2>
<button onclick="showPatient()">👤 Patient</button>
<button onclick="showDoctor()">👨‍⚕️ Doctor</button>
</div>

<!-- LOGIN -->
<div id="login" class="card hidden">
<h2>👨‍⚕️ Doctor Login</h2>
<input id="user" placeholder="👤 Username">
<input id="pass" type="password" placeholder="🔒 Password">
<button onclick="login()">Login</button>
<button onclick="backHome()">⬅ Back</button>
</div>

<!-- PATIENT FORM -->
<div id="app" class="card hidden">

<h2>🧠 Kalpana Skin Clinic</h2>

<input id="name" placeholder="👤 Name">
<input id="age" placeholder="🎂 Age">

<select id="location">
<option value="">📍 Body Location</option>
<option>Face</option>
<option>Hands</option>
<option>Legs</option>
</select>

<select id="severity">
<option value="">⚠️ Severity</option>
<option>Mild</option>
<option>Moderate</option>
<option>Severe</option>
</select>

<h3>🩺 Symptoms</h3>

<div class="symptoms">

<div class="symptom">Itching <input type="checkbox" value="itch"></div>
<div class="symptom">Dry Skin <input type="checkbox" value="dry"></div>

<div class="symptom">Redness <input type="checkbox" value="red"></div>
<div class="symptom">Pimples <input type="checkbox" value="pimple"></div>

<div class="symptom">Blackheads <input type="checkbox" value="black"></div>
<div class="symptom">Pus <input type="checkbox" value="pus"></div>

<div class="symptom">Ring Patch <input type="checkbox" value="ring"></div>
<div class="symptom">Scaling <input type="checkbox" value="scale"></div>

<div class="symptom">Dark Spots <input type="checkbox" value="dark"></div>

</div>

<button onclick="analyze()">🔍 Analyze</button>
<button onclick="backHome()">⬅ Back</button>

</div>

<!-- POPUP -->
<div id="popup" class="modal">
<div class="modal-box" id="result"></div>
</div>

<script>

function showPatient(){
home.classList.add("hidden");
app.classList.remove("hidden");
}

function showDoctor(){
home.classList.add("hidden");
login.classList.remove("hidden");
}

function backHome(){
location.reload();
}

function login(){
if(user.value==="doctor" && pass.value==="1234"){
loadDashboard();
}else alert("Invalid");
}

/* ANALYZE FIX */
function analyze(){

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;

if(!name || !age){
alert("Fill details");
return;
}

let symptoms=[...document.querySelectorAll("input:checked")].map(x=>x.value);

let disease="Skin Issue";

if(symptoms.includes("pimple")) disease="Acne";
if(symptoms.includes("ring")) disease="Fungal Infection";
if(symptoms.includes("itch")) disease="Eczema";

let graph=`<div>Confidence</div><div class="bar" style="width:70%"></div>`;

let history=JSON.parse(localStorage.getItem("patients")||"[]");
history.push({name,age,disease});
localStorage.setItem("patients",JSON.stringify(history));

result.innerHTML=`
<h2 style="text-align:center;">🧾 Report</h2>

<p>👤 ${name}</p>
<p>🎂 ${age}</p>

<hr>

<p>🦠 <b>${disease}</b></p>

${graph}

<hr>

<p>💊 Advice: Maintain hygiene</p>
<p>🛡 Precautions: Avoid touching area</p>
<p>👨‍⚕️ Visit doctor if severe</p>

<button onclick="download()">📄 Download</button>
<button onclick="closePop()">Close</button>
`;

popup.style.display="flex";
}

/* DASHBOARD */
function loadDashboard(){

let data=JSON.parse(localStorage.getItem("patients")||"[]");

let html="<h2>👨‍⚕️ Dashboard</h2>";

data.forEach(p=>{
html+=`<p>👤 ${p.name} | ${p.age} | ${p.disease}</p>`;
});

html+=`<button onclick="closePop()">Close</button>`;

result.innerHTML=html;
popup.style.display="flex";
}

function closePop(){
popup.style.display="none";
}

function download(){
window.print();
}

</script>

</body>
</html>
