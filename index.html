<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalpana Skin Clinic</title>

<style>
body{
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
  padding:20px;
}

/* COMMON */
.card{
  max-width:800px;
  margin:auto;
  background:#2b3f73;
  padding:25px;
  border-radius:15px;
  animation:fade 0.4s;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#38bdf8,#06b6d4);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#3d568a;
  border-radius:10px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
  max-height:80vh;
  overflow:auto;
  width:90%;
  max-width:600px;
}

/* DASHBOARD */
.patient{
  background:#f1f5f9;
  color:black;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

/* GRAPH */
.bar{
  height:8px;
  background:#38bdf8;
  margin:5px 0;
  border-radius:5px;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

.hidden{display:none;}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="card">
<h2>🏥 Kalpana Skin Clinic</h2>
<button onclick="openPatient()">👤 Patient</button>
<button onclick="openDoctor()">👨‍⚕️ Doctor</button>
</div>

<!-- PATIENT -->
<div id="patient" class="card hidden">

<h2>🧠 Patient Form</h2>

<input id="name" placeholder="👤 Name">
<input id="age" placeholder="🎂 Age">

<select id="gender">
<option>Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<select id="body">
<option>📍 Body Location</option>
<option>Face</option>
<option>Arms</option>
<option>Legs</option>
<option>Feet</option>
<option>Body</option>
<option>Neck</option>
<option>Back</option>
</select>

<select id="duration">
<option>⏳ Duration</option>
<option>Less than 1 week</option>
<option>1-2 weeks</option>
<option>More than 2 weeks</option>
</select>

<select id="severity">
<option>⚠️ Severity</option>
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<h3>🩺 Symptoms</h3>

<div class="grid">
<div class="item">Itching <input type="checkbox" value="itch"></div>
<div class="item">Dry Skin <input type="checkbox" value="dry"></div>
<div class="item">Redness <input type="checkbox" value="red"></div>
<div class="item">Pimples <input type="checkbox" value="pimple"></div>
<div class="item">Blackheads <input type="checkbox" value="black"></div>
<div class="item">Pus <input type="checkbox" value="pus"></div>
<div class="item">Ring Patch <input type="checkbox" value="ring"></div>
<div class="item">Scaling <input type="checkbox" value="scale"></div>
<div class="item">Dark Spots <input type="checkbox" value="dark"></div>
</div>

<button onclick="analyze()">🔍 Analyze</button>
<button onclick="goHome()">⬅ Back</button>

</div>

<!-- DOCTOR LOGIN -->
<div id="login" class="card hidden">
<h2>👨‍⚕️ Doctor Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="goHome()">⬅ Back</button>
</div>

<!-- POPUP -->
<div id="popup" class="modal">
<div class="modal-box" id="output"></div>
</div>

<script>

/* NAV */
function openPatient(){
home.classList.add("hidden");
patient.classList.remove("hidden");
}
function openDoctor(){
home.classList.add("hidden");
login.classList.remove("hidden");
}
function goHome(){
location.reload();
}

/* ANALYZE */
function analyze(){

let name=document.getElementById("name").value;
if(!name){alert("Enter name");return;}

let body=document.getElementById("body").value;
let severity=document.getElementById("severity").value;
let duration=document.getElementById("duration").value;

let symptoms=[...document.querySelectorAll("input:checked")].map(x=>x.value);

let scores={eczema:0,acne:0,fungal:0};

symptoms.forEach(s=>{
if(["itch","dry"].includes(s)) scores.eczema+=2;
if(["pimple","black"].includes(s)) scores.acne+=2;
if(["ring","scale"].includes(s)) scores.fungal+=3;
});

let disease=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

let names={
eczema:"Eczema",
acne:"Acne",
fungal:"Fungal Infection"
};

/* GRAPH */
let total=Object.values(scores).reduce((a,b)=>a+b,0);
let graph="";
for(let k in scores){
let p=total?Math.round(scores[k]/total*100):0;
graph+=`${names[k]} (${p}%)<div class="bar" style="width:${p}%"></div>`;
}

/* REPORT */
output.innerHTML=`
<h2>🧾 Report</h2>
<p>👤 ${name}</p>
<p>🦠 ${names[disease]}</p>
<p>⚠️ ${severity}</p>
<p>📍 ${body}</p>
<p>⏳ ${duration}</p>

<hr>

${graph}

<hr>

<p>💊 Advice: Keep skin clean</p>
<p>🛡 Precautions: Avoid touching infected area</p>
<p>⏳ Recovery: 1-2 weeks</p>
<p>👨‍⚕️ Consult doctor if severe</p>

<button onclick="download()">📄 Download PDF</button>
<button onclick="closePopup()">Close</button>
`;

popup.style.display="flex";

/* SAVE */
let data=JSON.parse(localStorage.getItem("patients")||"[]");
data.push({name,disease:names[disease],date:new Date().toLocaleString()});
localStorage.setItem("patients",JSON.stringify(data));

}

/* LOGIN */
function login(){
if(user.value==="doctor" && pass.value==="1234"){
loadDashboard();
}else alert("Wrong login");
}

/* DASHBOARD */
function loadDashboard(){

let data=JSON.parse(localStorage.getItem("patients")||"[]");

let html="<h2>👨‍⚕️ Dashboard</h2>";

data.forEach(p=>{
html+=`
<div class="patient">
👤 ${p.name}<br>
🦠 ${p.disease}<br>
📅 ${p.date}
</div>
`;
});

html+=`<button onclick="closePopup()">❌ Close</button>`;

output.innerHTML=html;
popup.style.display="flex";
}

/* PDF */
function download(){
window.print();
}

/* CLOSE */
function closePopup(){
popup.style.display="none";
goHome();
}

</script>

</body>
</html>
