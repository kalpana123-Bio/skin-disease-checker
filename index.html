<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#1e3a8a,#0f172a);
  color:white;
  padding:20px;
}

/* MAIN CARD */
.container {
  max-width:850px;
  margin:auto;
  background:#2b3f73;
  padding:25px;
  border-radius:15px;
  animation:fadeIn 0.5s ease;
}

/* HEADINGS CENTER FIX */
h2, h3 {
  text-align:center;
}

/* INPUT */
input, select {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:linear-gradient(90deg,#38bdf8,#06b6d4);
  color:white;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

button:hover {
  transform:scale(1.03);
}

/* PERFECT GRID */
.symptom-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

/* PERFECT ALIGNMENT */
.symptom-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#3d568a;
  border-radius:10px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:600px;
  animation:scaleUp 0.4s ease;
}

/* CARD */
.patient-card {
  background:#f1f5f9;
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}

/* ANIMATION */
@keyframes fadeIn {
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes scaleUp {
  from{transform:scale(0.8);}
  to{transform:scale(1);}
}

.hidden {display:none;}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
<h2>👨‍⚕️ Doctor Login</h2>

<input id="username" placeholder="👤 Username">
<input id="password" type="password" placeholder="🔒 Password">

<button onclick="login()">Login</button>
<button onclick="showPatient()">Continue as Patient</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

<h2>🧠 Kalpana Skin Clinic</h2>

<input id="name" placeholder="👤 Name">
<input id="age" placeholder="🎂 Age">

<select id="location">
<option value="">📍 Body Location</option>
<option>Face</option>
<option>Hands</option>
<option>Legs</option>
<option>Feet</option>
</select>

<select id="severity">
<option value="">⚠️ Severity</option>
<option>Mild</option>
<option>Moderate</option>
<option>Severe</option>
</select>

<h3>🩺 Symptoms</h3>

<div class="symptom-grid">

<div class="symptom-item">Itching <input type="checkbox" value="itch"></div>
<div class="symptom-item">Dry Skin <input type="checkbox" value="dry"></div>

<div class="symptom-item">Redness <input type="checkbox" value="redness"></div>
<div class="symptom-item">Pimples <input type="checkbox" value="pimple"></div>

<div class="symptom-item">Blackheads <input type="checkbox" value="blackhead"></div>
<div class="symptom-item">Pus <input type="checkbox" value="pus"></div>

<div class="symptom-item">Ring Patch <input type="checkbox" value="ring"></div>
<div class="symptom-item">Scaling <input type="checkbox" value="scaling"></div>

<div class="symptom-item">Dark Spots <input type="checkbox" value="dark"></div>

</div>

<!-- FIXED BUTTON -->
<button onclick="analyze()">🔍 Analyze</button>
<button id="dashboardBtn" class="hidden" onclick="loadPatients()">👨‍⚕️ Doctor Dashboard</button>

</div>

<!-- POPUP -->
<div id="popup" class="modal">
<div class="modal-content" id="result"></div>
</div>

<script>

/* LOGIN */
function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="doctor" && p==="1234"){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("dashboardBtn").classList.remove("hidden");
}else{
alert("Invalid Login ❌");
}
}

function showPatient(){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}

/* ANALYZE FIXED */
function analyze(){

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;
let location=document.getElementById("location").value;
let severity=document.getElementById("severity").value;

let symptoms = Array.from(document.querySelectorAll("input[type=checkbox]:checked")).map(cb=>cb.value);

if(!name || !age){
alert("Enter name & age");
return;
}

let disease="General Issue";
let recovery="1-2 weeks";
let advice="Maintain hygiene";
let precautions="Avoid irritation";

if(symptoms.includes("pimple")){
disease="Acne";
advice="Clean face regularly";
precautions="Avoid oily food";
}
if(symptoms.includes("ring")){
disease="Fungal Infection";
recovery="2-3 weeks";
advice="Keep area dry";
}
if(symptoms.includes("itch")){
disease="Eczema";
advice="Use moisturizer";
}

let doctorAdvice = severity==="Severe" ? "Visit doctor immediately" : "Consult if persists";

/* SAVE */
let history = JSON.parse(localStorage.getItem("patients") || "[]");
history.push({name, age, disease, date:new Date().toLocaleString()});
localStorage.setItem("patients", JSON.stringify(history));

/* REPORT */
document.getElementById("result").innerHTML=`

<h2>🧾 Diagnosis Report</h2>

<p>👤 <b>${name}</b></p>
<p>🎂 Age: ${age}</p>

<hr>

<p>🦠 <b>${disease}</b></p>
<p>⚠️ Severity: ${severity}</p>
<p>📍 Body: ${location}</p>

<hr>

<p>⏳ Recovery: ${recovery}</p>
<p>💊 Advice: ${advice}</p>
<p>🛡 Precautions: ${precautions}</p>
<p>👨‍⚕️ ${doctorAdvice}</p>

<p style="color:red;">⚠ Not a medical diagnosis</p>

<button onclick="closePopup()">Close</button>
`;

document.getElementById("popup").style.display="flex";
}

/* DASHBOARD */
function loadPatients(){

let history = JSON.parse(localStorage.getItem("patients") || "[]");

let html="<h2>👨‍⚕️ Doctor Dashboard</h2>";

history.forEach(p=>{
html+=`
<div class="patient-card">
<p>👤 <b>${p.name}</b></p>
<p>🦠 ${p.disease}</p>
<p>📅 ${p.date}</p>
</div>
`;
});

html+=`<button onclick="closePopup()">Close</button>`;

document.getElementById("result").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
