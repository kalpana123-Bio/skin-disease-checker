<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BACKGROUND */
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
  margin:0;
  padding:20px;
}

/* CONTAINER */
.container {
  max-width:900px;
  margin:auto;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
  animation: fadeIn 0.8s ease;
}

h2 { text-align:center; }

/* INPUTS */
input, select {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  outline:none;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(90deg,#38bdf8,#06b6d4);
  color:white;
  transition:0.3s;
}

button:hover {
  transform:scale(1.03);
  box-shadow:0 0 15px #38bdf8;
}

/* SYMPTOMS GRID */
.symptom-grid {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:12px;
}

.symptom-item {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  transition:0.3s;
}

.symptom-item:hover {
  background:#38bdf8;
}

.symptom-item input {
  width:18px;
  height:18px;
}

/* MOBILE */
@media(max-width:600px){
  .symptom-grid{
    grid-template-columns:1fr;
  }
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:600px;
  animation: scaleUp 0.4s ease;
}

.center { text-align:center; }

/* GRAPH */
.bar {
  height:10px;
  background:#38bdf8;
  margin:5px 0;
  border-radius:5px;
}

/* LOGIN */
.login {
  max-width:400px;
  margin:auto;
  margin-top:100px;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:12px;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1;}
}

@keyframes scaleUp {
  from{transform:scale(0.8);}
  to{transform:scale(1);}
}

.hidden { display:none; }

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
<h2>👨‍⚕️ Doctor Login</h2>

<input id="username" placeholder="👤 Username">
<input id="password" type="password" placeholder="🔒 Password">

<button onclick="login()">Login</button>
<button onclick="showPatient()">Continue as Patient</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

<h2>🧠 Kalpana Skin Clinic</h2>

<input id="name" placeholder="👤 Name">
<input id="age" placeholder="🎂 Age">

<select id="location">
<option value="">📍 Body Location</option>
<option value="face">Face</option>
<option value="feet">Feet</option>
<option value="body">Full Body</option>
</select>

<select id="severity">
<option value="">⚠️ Severity</option>
<option value="low">Mild</option>
<option value="medium">Moderate</option>
<option value="high">Severe</option>
</select>

<h3>🩺 Symptoms</h3>

<div class="symptom-grid">

<div class="symptom-item"><input type="checkbox" value="itch"> Itching</div>
<div class="symptom-item"><input type="checkbox" value="dry"> Dry Skin</div>

<div class="symptom-item"><input type="checkbox" value="redness"> Redness</div>
<div class="symptom-item"><input type="checkbox" value="pimple"> Pimples</div>

<div class="symptom-item"><input type="checkbox" value="blackhead"> Blackheads</div>
<div class="symptom-item"><input type="checkbox" value="pus"> Pus</div>

<div class="symptom-item"><input type="checkbox" value="ring"> Ring Patch</div>
<div class="symptom-item"><input type="checkbox" value="scaling"> Scaling</div>

<div class="symptom-item"><input type="checkbox" value="dark"> Dark Spots</div>

</div>

<button onclick="analyze()">Analyze</button>
<button id="dashboardBtn" class="hidden" onclick="loadPatients()">👨‍⚕️ Doctor Dashboard</button>

</div>

<!-- RESULT -->
<div id="popup" class="modal">
<div class="modal-content" id="report">
<div id="result"></div>
<button onclick="downloadPDF()">📄 Download PDF</button>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

// LOGIN
function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="doctor" && p==="1234"){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("dashboardBtn").classList.remove("hidden");
}else{
alert("Invalid Login ❌");
}
}

function showPatient(){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}

// GET SYMPTOMS
function getSymptoms(){
return Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
.map(cb=>cb.value);
}

// ANALYZE
function analyze(){

let name=document.getElementById("name").value;
let severity=document.getElementById("severity").value;

let symptoms=getSymptoms();

let scores={eczema:0,acne:0,fungal:0,bacterial:0,pigmentation:0};

symptoms.forEach(s=>{
if(["itch","dry","redness"].includes(s)) scores.eczema+=2;
if(["pimple","blackhead"].includes(s)) scores.acne+=2;
if(["ring","scaling"].includes(s)) scores.fungal+=3;
if(["pus"].includes(s)) scores.bacterial+=3;
if(["dark"].includes(s)) scores.pigmentation+=2;
});

let total=Object.values(scores).reduce((a,b)=>a+b,0);
let disease=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

let names={
eczema:"Eczema",
acne:"Acne",
fungal:"Fungal Infection",
bacterial:"Bacterial Infection",
pigmentation:"Pigmentation"
};

// GRAPH
let graph="";
for(let key in scores){
let percent=total?Math.round((scores[key]/total)*100):0;
graph+=`<div>${names[key]} (${percent}%)<div class="bar" style="width:${percent}%"></div></div>`;
}

// NEW REPORT LOGIC
let recovery="1-2 weeks";
let advice="Maintain proper hygiene.";
let precautions="Avoid touching affected area.";
let doctorAdvice="Consult doctor if persists.";

if(disease==="Acne"){
advice="Wash face twice daily, avoid oily food.";
precautions="Do not squeeze pimples.";
}
if(disease==="Fungal Infection"){
recovery="2-3 weeks";
advice="Keep area dry.";
precautions="Avoid sweating.";
}
if(disease==="Eczema"){
advice="Use moisturizer regularly.";
precautions="Avoid scratching.";
}

if(severity==="high"){
doctorAdvice="⚠ Immediate medical attention required.";
}

document.getElementById("result").innerHTML=`
<div class="center"><h3>🧾 Diagnosis Report</h3></div>

<p><b>👤 Name:</b> ${name}</p>
<p><b>🦠 Condition:</b> ${names[disease]}</p>
<p><b>⚠️ Severity:</b> ${severity}</p>

<hr>

${graph}

<hr>

<p><b>⏳ Recovery Time:</b> ${recovery}</p>
<p><b>💊 Advice:</b> ${advice}</p>
<p><b>🛡 Precautions:</b> ${precautions}</p>
<p><b>👨‍⚕️ When to see doctor:</b> ${doctorAdvice}</p>

<p style="color:red;">⚠ Not a medical diagnosis</p>
`;

document.getElementById("popup").style.display="flex";
}

// DASHBOARD
function loadPatients(){

let html = `
<div class="center">
<h2>👨‍⚕️ Doctor Dashboard</h2>
<p style="color:gray;">Patient Records</p>
</div>
`;

document.getElementById("result").innerHTML = html;
document.getElementById("popup").style.display="flex";
}

// CLOSE
function closePopup(){
document.getElementById("popup").style.display="none";
}

// PDF
function downloadPDF(){
html2pdf().from(document.getElementById("report")).save();
}

</script>

</body>
</html>
