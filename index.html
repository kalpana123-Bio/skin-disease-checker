<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1e3a8a,#0f172a);
  color:white;
  padding:20px;
}

.container {
  max-width:850px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2 { text-align:center; }

input, select {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(90deg,#38bdf8,#06b6d4);
  color:white;
}

.symptom-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.symptom-item {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#344a75;
  border-radius:10px;
}

.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:600px;
}

.patient-card {
  background:#f1f5f9;
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}

.hidden { display:none; }

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
<h2>👨‍⚕️ Doctor Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="showPatient()">Continue as Patient</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

<h2>🧠 Kalpana Skin Clinic</h2>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">

<!-- ✅ ADDED BACK -->
<select id="location">
<option value="">Body Location</option>
<option>Face</option>
<option>Hands</option>
<option>Legs</option>
<option>Feet</option>
<option>Full Body</option>
</select>

<select id="severity">
<option value="">Severity</option>
<option value="low">Mild</option>
<option value="medium">Moderate</option>
<option value="high">Severe</option>
</select>

<h3>Symptoms</h3>

<div class="symptom-grid">
<div class="symptom-item">Itching <input type="checkbox" value="itch"></div>
<div class="symptom-item">Dry Skin <input type="checkbox" value="dry"></div>
<div class="symptom-item">Redness <input type="checkbox" value="redness"></div>
<div class="symptom-item">Pimples <input type="checkbox" value="pimple"></div>
<div class="symptom-item">Blackheads <input type="checkbox" value="blackhead"></div>
<div class="symptom-item">Pus <input type="checkbox" value="pus"></div>
<div class="symptom-item">Ring Patch <input type="checkbox" value="ring"></div>
<div class="symptom-item">Scaling <input type="checkbox" value="scaling"></div>
<div class="symptom-item">Dark Spots <input type="checkbox" value="dark"></div>
</div>

<button onclick="analyze()">Analyze</button>
<button id="dashboardBtn" class="hidden" onclick="loadPatients()">Doctor Dashboard</button>

</div>

<!-- RESULT -->
<div id="popup" class="modal">
<div class="modal-content" id="result"></div>
</div>

<script>

// LOGIN
function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="doctor" && p==="1234"){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("dashboardBtn").classList.remove("hidden");
}else{
alert("Invalid Login");
}
}

function showPatient(){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}

// GET SYMPTOMS
function getSymptoms(){
return Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
.map(cb=>cb.value);
}

// ANALYZE
function analyze(){

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;
let location=document.getElementById("location").value;
let severity=document.getElementById("severity").value;

let symptoms=getSymptoms();

// DETECT DISEASE
let disease="General Skin Issue";

if(symptoms.includes("pimple")) disease="Acne";
if(symptoms.includes("ring")) disease="Fungal Infection";
if(symptoms.includes("itch")) disease="Eczema";

// RECOVERY TIME
let recovery = severity==="high" ? "3-4 weeks" :
               severity==="medium" ? "2 weeks" :
               "5-7 days";

// ADVICE
let advice = "Maintain hygiene and keep skin clean";

// PRECAUTIONS
let precaution = "Avoid scratching and use mild products";

// DOCTOR CONDITION
let doctorAdvice = severity==="high" ? "Consult doctor immediately" :
                   "Monitor condition";

// SAVE
let history = JSON.parse(localStorage.getItem("patients") || "[]");
history.push({name, age, disease, date:new Date().toLocaleString()});
localStorage.setItem("patients", JSON.stringify(history));

// REPORT
document.getElementById("result").innerHTML=`
<h3 style="text-align:center;">🧾 Diagnosis Report</h3>

<p><b>👤 Name:</b> ${name}</p>
<p><b>🎂 Age:</b> ${age}</p>

<p><b>🦠 Condition:</b> ${disease}</p>
<p><b>📍 Affected Area:</b> ${location}</p>
<p><b>⚠ Severity:</b> ${severity}</p>

<hr>

<p><b>⏳ Recovery Time:</b> ${recovery}</p>

<p><b>💊 Advice:</b> ${advice}</p>
<p><b>🛡 Precautions:</b> ${precaution}</p>

<p><b>👨‍⚕️ Doctor Recommendation:</b> ${doctorAdvice}</p>

<p style="color:red;">⚠ Not a medical diagnosis</p>

<button onclick="closePopup()">Close</button>
`;

document.getElementById("popup").style.display="flex";
}

// DASHBOARD
function loadPatients(){

let history = JSON.parse(localStorage.getItem("patients") || "[]");

let html = "<h2>Doctor Dashboard</h2>";

history.forEach(p=>{
html+=`
<div class="patient-card">
<p><b>${p.name}</b></p>
<p>${p.disease}</p>
<p>${p.date}</p>
</div>
`;
});

html += `<button onclick="closePopup()">Close</button>`;

document.getElementById("result").innerHTML = html;
document.getElementById("popup").style.display="flex";
}

// CLOSE
function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
