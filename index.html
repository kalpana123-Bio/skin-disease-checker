<script>

// FIX: define globals directly (NO DOMContentLoaded)

const home = document.getElementById("home");
const patient = document.getElementById("patient");
const loginBox = document.getElementById("login");
const popup = document.getElementById("popup");
const output = document.getElementById("output");

// NAV
function openPatient(){
  home.style.display="none";
  patient.style.display="block";
}

function openDoctor(){
  home.style.display="none";
  loginBox.style.display="block";
}

function goHome(){
  location.reload();
}

// ANALYZE
function analyze(){

  let name = document.getElementById("name").value;

  if(!name){
    alert("Enter name");
    return;
  }

  let body = document.getElementById("body").value;
  let severity = document.getElementById("severity").value;
  let duration = document.getElementById("duration").value;

  // ONLY CHECKBOXES
  let checkboxes = document.querySelectorAll(".grid input[type='checkbox']");
  let symptoms = [];

  checkboxes.forEach(cb=>{
    if(cb.checked){
      symptoms.push(cb.value);
    }
  });

  if(symptoms.length===0){
    alert("Select at least one symptom");
    return;
  }

  let scores = {eczema:0, acne:0, fungal:0};

  symptoms.forEach(s=>{
    if(s==="itch" || s==="dry") scores.eczema+=2;
    if(s==="pimple" || s==="black") scores.acne+=2;
    if(s==="ring" || s==="scale") scores.fungal+=3;
  });

  // SAFE FIND MAX
  let disease = "eczema";
  let max = -1;

  for(let k in scores){
    if(scores[k] > max){
      max = scores[k];
      disease = k;
    }
  }

  let names = {
    eczema:"Eczema",
    acne:"Acne",
    fungal:"Fungal Infection"
  };

  // GRAPH
  let total = scores.eczema + scores.acne + scores.fungal;
  let graph = "";

  for(let k in scores){
    let p = total ? Math.round(scores[k]/total*100) : 0;
    graph += names[k] + " ("+p+"%)<div class='bar' style='width:"+p+"%'></div>";
  }

  // REPORT
  output.innerHTML = `
  <h2 style="text-align:center;">🧾 Report</h2>

  <p>👤 ${name}</p>
  <p>🦠 ${names[disease]}</p>
  <p>⚠️ ${severity}</p>
  <p>📍 ${body}</p>
  <p>⏳ ${duration}</p>

  <hr>

  ${graph}

  <hr>

  <p>💊 Advice: Keep skin clean</p>
  <p>🛡 Precautions: Avoid touching infected area</p>
  <p>⏳ Recovery: 1-2 weeks</p>
  <p>👨‍⚕️ Consult doctor if severe</p>

  <button onclick="download()">📄 Download PDF</button>
  <button onclick="closePopup()">Close</button>
  `;

  popup.style.display="flex";

  // SAVE
  let data = JSON.parse(localStorage.getItem("patients") || "[]");

  data.push({
    name:name,
    disease:names[disease],
    date:new Date().toLocaleString()
  });

  localStorage.setItem("patients", JSON.stringify(data));
}

// LOGIN
function login(){

  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u==="doctor" && p==="1234"){
    loadDashboard();
  } else {
    alert("Wrong login");
  }
}

// DASHBOARD
function loadDashboard(){

  let data = JSON.parse(localStorage.getItem("patients") || "[]");

  let html = "<h2 style='text-align:center;'>👨‍⚕️ Dashboard</h2>";

  if(data.length===0){
    html += "<p>No patient records</p>";
  }

  data.forEach(p=>{
    html += `
    <div class="patient">
      👤 ${p.name}<br>
      🦠 ${p.disease}<br>
      📅 ${p.date}
    </div>
    `;
  });

  html += `<button onclick="closePopup()">❌ Close</button>`;

  output.innerHTML = html;
  popup.style.display="flex";
}

// PDF
function download(){
  window.print();
}

// CLOSE
function closePopup(){
  popup.style.display="none";
  goHome();
}

</script>
