<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
  padding:20px;
}

/* CENTER */
.center{text-align:center;}

/* CARD */
.container{
  max-width:850px;
  margin:auto;
  background:#2b3f73;
  padding:25px;
  border-radius:15px;
  animation:fadeIn 0.5s;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:linear-gradient(90deg,#38bdf8,#06b6d4);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* INPUT FIX */
input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

/* GRID */
.symptom-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.symptom-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#3d568a;
  border-radius:10px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:600px;
  max-height:80vh;
  overflow:auto;
}

/* SCROLL DASHBOARD */
.scroll{
  max-height:300px;
  overflow:auto;
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

.hidden{display:none;}

.bar{
  height:10px;
  background:#38bdf8;
  margin:5px 0;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="container center">
<h2>🏥 Kalpana Skin Clinic</h2>

<button onclick="showPatient()">👤 Patient</button>
<button onclick="loadDashboard()">👨‍⚕️ Doctor</button>
</div>

<!-- PATIENT FORM -->
<div id="app" class="container hidden">

<h2 class="center">🧠 Skin Analysis</h2>

<input id="name" placeholder="👤 Name">
<input id="age" placeholder="🎂 Age">

<select id="location">
<option value="">📍 Body Location</option>
<option>Face</option>
<option>Hands</option>
<option>Legs</option>
</select>

<select id="severity">
<option value="">⚠️ Severity</option>
<option>Mild</option>
<option>Moderate</option>
<option>Severe</option>
</select>

<h3 class="center">🩺 Symptoms</h3>

<div class="symptom-grid">

<div class="symptom-item">Itching <input type="checkbox" value="itch"></div>
<div class="symptom-item">Dry Skin <input type="checkbox" value="dry"></div>

<div class="symptom-item">Redness <input type="checkbox" value="redness"></div>
<div class="symptom-item">Pimples <input type="checkbox" value="pimple"></div>

<div class="symptom-item">Blackheads <input type="checkbox" value="blackhead"></div>
<div class="symptom-item">Pus <input type="checkbox" value="pus"></div>

<div class="symptom-item">Ring Patch <input type="checkbox" value="ring"></div>
<div class="symptom-item">Scaling <input type="checkbox" value="scaling"></div>

<div class="symptom-item">Dark Spots <input type="checkbox" value="dark"></div>

</div>

<button onclick="analyze()">🔍 Analyze</button>
<button onclick="goHome()">⬅ Back</button>

</div>

<!-- POPUP -->
<div id="popup" class="modal">
<div class="modal-content" id="result"></div>
</div>

<script>

/* NAV */
function showPatient(){
home.classList.add("hidden");
app.classList.remove("hidden");
}

function goHome(){
app.classList.add("hidden");
home.classList.remove("hidden");
}

/* ANALYZE */
function analyze(){

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;
let severity=document.getElementById("severity").value;

let symptoms=Array.from(document.querySelectorAll("input[type=checkbox]:checked")).map(cb=>cb.value);

if(!name || !age){
alert("Fill details");
return;
}

let disease="General Issue";
let advice="Maintain hygiene";
let precautions="Avoid irritation";
let recovery="1-2 weeks";

if(symptoms.includes("pimple")){
disease="Acne";
advice="Clean face";
}
if(symptoms.includes("ring")){
disease="Fungal Infection";
recovery="2-3 weeks";
}
if(symptoms.includes("itch")){
disease="Eczema";
}

let doctorAdvice=severity==="Severe"?"Visit doctor immediately":"Consult if persists";

/* SAVE */
let data=JSON.parse(localStorage.getItem("patients")||"[]");
data.push({name,age,disease,date:new Date().toLocaleString()});
localStorage.setItem("patients",JSON.stringify(data));

/* GRAPH */
let graph=`<div>Confidence<div class="bar" style="width:80%"></div></div>`;

/* REPORT */
result.innerHTML=`
<h2 class="center">🧾 Report</h2>

<p>👤 ${name}</p>
<p>🦠 ${disease}</p>
<p>⚠️ ${severity}</p>

<hr>

${graph}

<p>⏳ ${recovery}</p>
<p>💊 ${advice}</p>
<p>🛡 ${precautions}</p>
<p>👨‍⚕️ ${doctorAdvice}</p>

<button onclick="downloadPDF()">📄 Download</button>
<button onclick="closePopup()">Close</button>
`;

popup.style.display="flex";
}

/* DASHBOARD */
function loadDashboard(){

home.classList.add("hidden");

let data=JSON.parse(localStorage.getItem("patients")||"[]");

let html="<h2 class='center'>👨‍⚕️ Dashboard</h2><div class='scroll'>";

data.forEach(p=>{
html+=`
<div style="background:#eee;padding:10px;margin:10px;border-radius:8px;">
<p>👤 ${p.name}</p>
<p>🎂 ${p.age}</p>
<p>🦠 ${p.disease}</p>
<p>📅 ${p.date}</p>
</div>
`;
});

html+="</div><button onclick='goHome()'>⬅ Back</button>";

result.innerHTML=html;
popup.style.display="flex";
}

function closePopup(){
popup.style.display="none";
}

/* PDF */
function downloadPDF(){
window.print();
}

</script>

</body>
</html>
