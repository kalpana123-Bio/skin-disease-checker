<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic - Secure System</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#1e3a8a,#0f172a);
  color:white;
  padding:20px;
}

.container {
  max-width:900px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
}

h2 { text-align:center; }

input, select, button {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

.section {
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:10px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

label {
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
}

input[type="checkbox"]{
  width:16px;
  height:16px;
}

button {
  background:#38bdf8;
  font-weight:bold;
  cursor:pointer;
}

/* modal */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:600px;
}

.center { text-align:center; }

.bar {
  height:10px;
  background:#38bdf8;
  margin:5px 0;
}

</style>
</head>

<body>

<div class="container">

<h2>🧠 Kalpana Skin Clinic</h2>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">

<select id="location">
<option value="">Body Location</option>
<option value="face">Face</option>
<option value="feet">Feet</option>
<option value="body">Full Body</option>
</select>

<select id="severity">
<option value="">Severity</option>
<option value="low">Mild</option>
<option value="medium">Moderate</option>
<option value="high">Severe</option>
</select>

<div class="section">
<h3>Symptoms</h3>

<div class="grid">

<label><input type="checkbox" value="itch"> Itching</label>
<label><input type="checkbox" value="dry"> Dry skin</label>
<label><input type="checkbox" value="redness"> Redness</label>

<label><input type="checkbox" value="pimple"> Pimples</label>
<label><input type="checkbox" value="blackhead"> Blackheads</label>
<label><input type="checkbox" value="pus"> Pus</label>

<label><input type="checkbox" value="ring"> Ring patch</label>
<label><input type="checkbox" value="scaling"> Scaling</label>
<label><input type="checkbox" value="dark"> Dark spots</label>

</div>
</div>

<button onclick="analyze()">Analyze</button>

<!-- 🔐 Doctor only -->
<button onclick="secureHistory()">Doctor Login</button>

</div>

<!-- RESULT -->
<div id="popup" class="modal">
<div class="modal-content" id="report">

<div id="result"></div>

<button onclick="downloadPDF()">Download PDF</button>
<button onclick="closePopup()">Close</button>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

function getSymptoms(){
 return Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
 .map(cb=>cb.value);
}

function analyze(){

let name = document.getElementById("name").value;
let age = document.getElementById("age").value;

let symptoms = getSymptoms();
let location = document.getElementById("location").value;
let severity = document.getElementById("severity").value;

let scores = {eczema:0, acne:0, fungal:0, bacterial:0, pigmentation:0};

symptoms.forEach(s=>{
 if(["itch","dry","redness"].includes(s)) scores.eczema+=2;
 if(["pimple","blackhead"].includes(s)) scores.acne+=2;
 if(["ring","scaling"].includes(s)) scores.fungal+=3;
 if(["pus"].includes(s)) scores.bacterial+=3;
 if(["dark"].includes(s)) scores.pigmentation+=2;
});

if(location==="face") scores.acne+=2;
if(location==="feet") scores.fungal+=2;
if(severity==="high") scores.bacterial+=2;

// % calculation
let total = Object.values(scores).reduce((a,b)=>a+b,0);

let percentages = {};
for(let key in scores){
 percentages[key] = total ? Math.round((scores[key]/total)*100) : 0;
}

// max disease
let disease = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

let diseasesName = {
eczema:"Eczema",
acne:"Acne",
fungal:"Fungal Infection",
bacterial:"Bacterial Infection",
pigmentation:"Pigmentation"
};

// SAVE (hidden from user)
let record = {
 name, age, disease:diseasesName[disease], date:new Date().toLocaleString()
};

let history = JSON.parse(localStorage.getItem("patients") || "[]");
history.push(record);
localStorage.setItem("patients", JSON.stringify(history));

// GRAPH
let graphHTML = "";
for(let key in percentages){
 graphHTML += `<div>${diseasesName[key]} (${percentages[key]}%)
 <div class="bar" style="width:${percentages[key]}%"></div></div>`;
}

// OUTPUT
document.getElementById("result").innerHTML = `
<div class="center">
<h3>Diagnosis Report</h3>
</div>

<p><b>Name:</b> ${name}</p>
<p><b>Age:</b> ${age}</p>

<p><b>Condition:</b> ${diseasesName[disease]}</p>

<h4>Probability</h4>
${graphHTML}

<p><b>Advice:</b> Basic skin care & hygiene</p>
<p><b>Precautions:</b> Avoid irritation</p>
<p><b>When to see doctor:</b> ${severity==="high"?"Immediately":"If persists"}</p>

<p style="color:red;">⚠ Not a medical diagnosis</p>
`;

document.getElementById("popup").style.display="flex";
}

// 🔐 SECURE HISTORY (ONLY YOU)
function secureHistory(){

let password = prompt("Enter Doctor Password");

if(password !== "admin123"){   // change password here
  alert("Access Denied ❌");
  return;
}

let history = JSON.parse(localStorage.getItem("patients") || "[]");

let html = "<h3>🔐 Patient History</h3>";

history.forEach(p=>{
 html += `<p>${p.name} | ${p.disease} | ${p.date}</p>`;
});

document.getElementById("result").innerHTML = html;
document.getElementById("popup").style.display="flex";
}

function downloadPDF(){
 html2pdf().from(document.getElementById("report")).save("Diagnosis.pdf");
}

function closePopup(){
 document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
