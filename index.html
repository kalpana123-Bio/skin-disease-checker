<script>

// ✅ WAIT FOR PAGE LOAD (CRITICAL FIX)
document.addEventListener("DOMContentLoaded", function(){

// GET ELEMENTS
const home = document.getElementById("home");
const patient = document.getElementById("patient");
const loginBox = document.getElementById("login");
const popup = document.getElementById("popup");
const output = document.getElementById("output");

// NAV
window.openPatient = function(){
  home.classList.add("hidden");
  patient.classList.remove("hidden");
}

window.openDoctor = function(){
  home.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

window.goHome = function(){
  location.reload();
}

// ANALYZE
window.analyze = function(){

  let name=document.getElementById("name").value.trim();
  if(!name){
    alert("Enter name");
    return;
  }

  let body=document.getElementById("body").value;
  let severity=document.getElementById("severity").value;
  let duration=document.getElementById("duration").value;

  // ✅ ONLY CHECKBOXES
  let symptoms=[...document.querySelectorAll('.grid input[type="checkbox"]:checked')]
                .map(x=>x.value);

  if(symptoms.length===0){
    alert("Select at least one symptom");
    return;
  }

  let scores={eczema:0,acne:0,fungal:0};

  symptoms.forEach(s=>{
    if(["itch","dry"].includes(s)) scores.eczema+=2;
    if(["pimple","black"].includes(s)) scores.acne+=2;
    if(["ring","scale"].includes(s)) scores.fungal+=3;
  });

  // ✅ SAFE LOGIC
  let disease = "eczema";
  let max = -1;

  for(let k in scores){
    if(scores[k] > max){
      max = scores[k];
      disease = k;
    }
  }

  let names={
    eczema:"Eczema",
    acne:"Acne",
    fungal:"Fungal Infection"
  };

  // GRAPH
  let total=Object.values(scores).reduce((a,b)=>a+b,0);
  let graph="";

  for(let k in scores){
    let p=total?Math.round(scores[k]/total*100):0;
    graph+=`
    <div>
      ${names[k]} (${p}%)
      <div class="bar" style="width:${p}%"></div>
    </div>`;
  }

  // REPORT
  output.innerHTML=`
  <h2 style="text-align:center;">🧾 Report</h2>

  <p>👤 ${name}</p>
  <p>🦠 ${names[disease]}</p>
  <p>⚠️ ${severity}</p>
  <p>📍 ${body}</p>
  <p>⏳ ${duration}</p>

  <hr>

  ${graph}

  <hr>

  <p>💊 Advice: Keep skin clean</p>
  <p>🛡 Precautions: Avoid touching infected area</p>
  <p>⏳ Recovery: 1-2 weeks</p>
  <p>👨‍⚕️ Consult doctor if severe</p>

  <button onclick="download()">📄 Download PDF</button>
  <button onclick="closePopup()">Close</button>
  `;

  popup.style.display="flex";

  // SAVE DATA
  let data=JSON.parse(localStorage.getItem("patients")||"[]");

  data.push({
    name,
    disease:names[disease],
    date:new Date().toLocaleString()
  });

  localStorage.setItem("patients",JSON.stringify(data));
}

// LOGIN
window.login = function(){

  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="doctor" && p==="1234"){
    loadDashboard();
  } else {
    alert("Wrong login");
  }
}

// DASHBOARD
function loadDashboard(){

  let data=JSON.parse(localStorage.getItem("patients")||"[]");

  let html="<h2 style='text-align:center;'>👨‍⚕️ Dashboard</h2>";

  if(data.length===0){
    html+="<p>No patient records yet</p>";
  }

  data.forEach(p=>{
    html+=`
    <div class="patient">
      👤 ${p.name}<br>
      🦠 ${p.disease}<br>
      📅 ${p.date}
    </div>
    `;
  });

  html+=`<button onclick="closePopup()">❌ Close</button>`;

  output.innerHTML=html;
  popup.style.display="flex";
}

// PDF
window.download = function(){
  window.print();
}

// CLOSE
window.closePopup = function(){
  popup.style.display="none";
  goHome();
}

}); // END DOMContentLoaded

</script>
