<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BACKGROUND */
body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
  margin:0;
  padding:20px;
}

/* CONTAINER */
.container{
  max-width:750px;
  margin:auto;
  background:#2b3f73;
  padding:25px;
  border-radius:15px;
  animation:fadeIn 0.5s ease;
}

h2,h3{text-align:center;}

/* INPUT FIX PERFECT */
input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  box-sizing:border-box;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:linear-gradient(90deg,#38bdf8,#06b6d4);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{transform:scale(1.03);}

/* PERFECT GRID */
.symptom-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* PERFECT ALIGNMENT */
.symptom-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#3d568a;
  border-radius:10px;
}

/* MODAL SCROLL FIX */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:600px;
  max-height:90vh;
  overflow-y:auto;   /* 🔥 SCROLL FIX */
  animation:scaleUp 0.4s;
}

/* GRAPH */
.bar{
  height:10px;
  background:#38bdf8;
  margin:5px 0;
  border-radius:5px;
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
@keyframes scaleUp{
  from{transform:scale(0.8);}
  to{transform:scale(1);}
}

.hidden{display:none;}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
<h2>👨‍⚕️ Doctor Login</h2>

<input id="username" placeholder="👤 Username">
<input id="password" type="password" placeholder="🔒 Password">

<button onclick="login()">🔐 Login</button>
<button onclick="showPatient()">👤 Continue as Patient</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

<h2>🧠 Kalpana Skin Clinic</h2>

<input id="name" placeholder="👤 Name">
<input id="age" placeholder="🎂 Age">

<select id="location">
<option value="">📍 Body Location</option>
<option>Face</option>
<option>Hands</option>
<option>Legs</option>
</select>

<select id="severity">
<option value="">⚠️ Severity</option>
<option value="low">Mild</option>
<option value="medium">Moderate</option>
<option value="high">Severe</option>
</select>

<h3>🩺 Symptoms</h3>

<div class="symptom-grid">

<div class="symptom-item">Itching <input type="checkbox" value="itch"></div>
<div class="symptom-item">Dry Skin <input type="checkbox" value="dry"></div>

<div class="symptom-item">Redness <input type="checkbox" value="redness"></div>
<div class="symptom-item">Pimples <input type="checkbox" value="pimple"></div>

<div class="symptom-item">Blackheads <input type="checkbox" value="blackhead"></div>
<div class="symptom-item">Pus <input type="checkbox" value="pus"></div>

<div class="symptom-item">Ring Patch <input type="checkbox" value="ring"></div>
<div class="symptom-item">Scaling <input type="checkbox" value="scaling"></div>

<div class="symptom-item">Dark Spots <input type="checkbox" value="dark"></div>

</div>

<button onclick="analyze()">🔍 Analyze</button>

</div>

<!-- RESULT -->
<div id="popup" class="modal">
<div class="modal-content" id="result"></div>
</div>

<script>

/* LOGIN */
function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="doctor" && p==="1234"){
loadDashboard();
}else{
alert("Invalid Login");
}
}

function showPatient(){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}

/* ANALYZE FIXED */
function analyze(){

let name=document.getElementById("name").value;
let severity=document.getElementById("severity").value;

let symptoms=Array.from(document.querySelectorAll("input[type=checkbox]:checked")).map(cb=>cb.value);

if(!name){
alert("Enter name");
return;
}

/* SCORING */
let scores={eczema:0,acne:0,fungal:0};

symptoms.forEach(s=>{
if(["itch","dry","redness"].includes(s)) scores.eczema+=2;
if(["pimple","blackhead"].includes(s)) scores.acne+=2;
if(["ring","scaling"].includes(s)) scores.fungal+=3;
});

let disease=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

let names={
eczema:"Eczema",
acne:"Acne",
fungal:"Fungal Infection"
};

/* GRAPH */
let total=Object.values(scores).reduce((a,b)=>a+b,0);
let graph="";
for(let key in scores){
let percent=total?Math.round(scores[key]/total*100):0;
graph+=`${names[key]} (${percent}%)<div class="bar" style="width:${percent}%"></div>`;
}

/* REPORT */
document.getElementById("result").innerHTML=`
<h2 style="text-align:center;">🧾 Diagnosis Report</h2>

<p><b>👤 Name:</b> ${name}</p>
<p><b>🦠 Condition:</b> ${names[disease]}</p>

<hr>

${graph}

<hr>

<p>💊 Advice: Maintain hygiene & proper care</p>
<p>🛡 Precautions: Avoid touching affected area</p>
<p>⏳ Recovery: 1-2 weeks</p>
<p>👨‍⚕️ Doctor: ${severity==="high"?"Immediate visit":"Consult if needed"}</p>

<p style="color:red;">⚠ Not a medical diagnosis</p>

<button onclick="closePopup()">Close</button>
`;

document.getElementById("popup").style.display="flex";
}

/* DASHBOARD */
function loadDashboard(){
document.getElementById("result").innerHTML=`
<h2 style="text-align:center;">👨‍⚕️ Doctor Dashboard</h2>
<p style="text-align:center;">Patient records will appear here</p>
<button onclick="closePopup()">Close</button>
`;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
