<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* FIX INPUT WIDTH ISSUE */
*{box-sizing:border-box;}

body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
  padding:20px;
}

/* LOGIN */
.login{
  max-width:400px;
  margin:auto;
  margin-top:100px;
  background:#2b3f73;
  padding:25px;
  border-radius:15px;
  animation:fadeIn 0.5s ease;
}

/* MAIN */
.container{
  max-width:850px;
  margin:auto;
  background:#2b3f73;
  padding:25px;
  border-radius:15px;
  animation:fadeIn 0.5s ease;
}

h2,h3{text-align:center}

/* PERFECT INPUT */
input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:linear-gradient(90deg,#38bdf8,#06b6d4);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{transform:scale(1.03)}

/* CHECKBOX ALIGN FIX */
.symptom-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.symptom-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#3d568a;
  border-radius:10px;
}

/* MODAL SCROLL FIX */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:600px;
  max-height:80vh;
  overflow-y:auto; /* ✅ SCROLL FIX */
  animation:scaleUp 0.4s ease;
}

/* GRAPH */
.bar{
  height:10px;
  background:#38bdf8;
  margin:5px 0;
  border-radius:5px;
}

/* CARD */
.patient-card{
  background:#f1f5f9;
  padding:12px;
  border-radius:10px;
  margin:10px 0;
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1;}
}

@keyframes scaleUp{
  from{transform:scale(0.8);}
  to{transform:scale(1);}
}

.hidden{display:none;}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
<h2>👨‍⚕️ Doctor Login</h2>

<input id="username" placeholder="👤 Username">
<input id="password" type="password" placeholder="🔒 Password">

<button onclick="login()">🔐 Login</button>
<button onclick="showPatient()">👤 Continue as Patient</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

<h2>🧠 Kalpana Skin Clinic</h2>

<input id="name" placeholder="👤 Name">
<input id="age" placeholder="🎂 Age">

<select id="location">
<option value="">📍 Body Location</option>
<option>Face</option>
<option>Hands</option>
<option>Legs</option>
</select>

<select id="severity">
<option value="">⚠️ Severity</option>
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<h3>🩺 Symptoms</h3>

<div class="symptom-grid">

<div class="symptom-item">Itching <input type="checkbox" value="itch"></div>
<div class="symptom-item">Dry Skin <input type="checkbox" value="dry"></div>

<div class="symptom-item">Redness <input type="checkbox" value="redness"></div>
<div class="symptom-item">Pimples <input type="checkbox" value="pimple"></div>

<div class="symptom-item">Blackheads <input type="checkbox" value="blackhead"></div>
<div class="symptom-item">Pus <input type="checkbox" value="pus"></div>

<div class="symptom-item">Ring Patch <input type="checkbox" value="ring"></div>
<div class="symptom-item">Scaling <input type="checkbox" value="scaling"></div>

<div class="symptom-item">Dark Spots <input type="checkbox" value="dark"></div>

</div>

<button onclick="analyze()">🔍 Analyze</button>

</div>

<!-- RESULT -->
<div id="popup" class="modal">
<div class="modal-content" id="result"></div>
</div>

<script>

/* LOGIN */
function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="doctor" && p==="1234"){
loadDashboard();
}else{
alert("Invalid Login");
}
}

function showPatient(){
loginPage.classList.add("hidden");
app.classList.remove("hidden");
}

/* ANALYZE FIXED */
function analyze(){

let name=document.getElementById("name").value;
let severity=document.getElementById("severity").value;

if(!name){
alert("Enter name");
return;
}

let disease="Skin Issue";

/* GRAPH */
let graph=`<div>Acne (60%)<div class="bar" style="width:60%"></div></div>
<div>Eczema (40%)<div class="bar" style="width:40%"></div></div>`;

/* SAVE */
let history=JSON.parse(localStorage.getItem("patients")||"[]");
history.push({name,disease,date:new Date().toLocaleString()});
localStorage.setItem("patients",JSON.stringify(history));

/* REPORT FULL */
result.innerHTML=`
<h2 style="text-align:center;">🧾 Diagnosis Report</h2>

<p>👤 <b>${name}</b></p>
<p>🦠 Condition: ${disease}</p>
<p>⚠️ Severity: ${severity}</p>

<hr>

${graph}

<hr>

<p>💊 Advice: Maintain hygiene, avoid oily products</p>
<p>🛡 Precautions: Avoid touching affected area</p>
<p>👨‍⚕️ Consult doctor if severe</p>

<button onclick="closePopup()">Close</button>
`;

popup.style.display="flex";
}

/* DASHBOARD */
function loadDashboard(){

let history=JSON.parse(localStorage.getItem("patients")||"[]");

let html="<h2>👨‍⚕️ Doctor Dashboard</h2>";

history.forEach(p=>{
html+=`
<div class="patient-card">
<p>👤 ${p.name}</p>
<p>🦠 ${p.disease}</p>
<p>📅 ${p.date}</p>
</div>
`;
});

html+=`<button onclick="closePopup()">Close</button>`;

result.innerHTML=html;
popup.style.display="flex";
}

function closePopup(){
popup.style.display="none";
}

</script>

</body>
</html>
